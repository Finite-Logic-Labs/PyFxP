# .github/workflows/ci.yml
#
# Runs the test suite on every push and pull request.
#
# NOTE: this CI only runs on platforms where pre-compiled binaries exist
# in the repo. If you push binaries for linux_x86_64/cp312 only, the
# linux cp312 job will pass and the others will be skipped gracefully.
#
# The matrix below covers the most common targets. Expand it as you
# build and push more binaries.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          pip install -e ".[dev]"

      - name: Check binaries are importable
        # If the binary for this platform isn't present the import will fail
        # with a clear message rather than a confusing test error.
        run: |
          python -c "from pyfxp.graph import Graph; print('graph OK')"
          python -c "from pyfxp.node import Node; print('node OK')"
          python -c "from pyfxp.rtlgen import RTLGen; print('rtlgen OK')"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Coverage report
        run: |
          pip install pytest-cov
          pytest tests/ --cov=pyfxp --cov-report=term-missing
        continue-on-error: true   # don't fail CI on coverage drop, just report